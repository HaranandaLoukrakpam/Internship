<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .uber{
            background-color: black;
            color: white;
            border: none;
            height: 50px;
            width: 145px;
            font-weight: bold;
            font-family: sans-serif;
            font-size: medium;
        }
        .amazon{
            background-color: rgb(255, 216, 20);
            color: black;
            border: none;
            border-radius: 30px;
            width: 165px;
            height: 50px;
            font-size: medium;

        }
        .github{
            background-color: rgb(46, 164, 79);
            color: white;
            border: none;
            border-radius: 3px;
            width: 110px;
            height: 50px;
            font-weight: bold;
            font-size: large;
        }
        .bootstrap1{
            background-color: rgb(121, 82, 179);
            color: white;
            font-size: medium;
            border: none;
            border-radius: 3px;
            height: 50px;
            width: 120px;
            font-weight: bold;
            
        }
        .bootstrap2{
            color: rgb(121, 82, 179);
            background-color: transparent;
            font-size: medium;
            border: 1px solid rgb(121, 82, 179);
            border-radius: 3px;
            height: 50px;
            width: 110px;
            font-weight: bold; 
        }
        .linkedin1{
            background-color: rgb(10, 102, 194);
            color: white;
            font-size: medium;
            border: none;
            border-radius: 30px;
            height: 50px;
            width: 255px;
            font-weight: bold;

            
        }
        .linkedin2{
            color: rgb(10, 102, 194);
            background-color: transparent;
            font-size: medium;
            border: 1px solid rgb(10, 102, 194);
            border-radius: 30px;
            height: 50px;
            width: 110px;
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <button class="uber">Request now</button>
    <button class="amazon">Add to Cart</button>
    <button class="github">Sign up</button>
    <br><br>
    <button class="bootstrap1">Get started</button>
    <button class="bootstrap2">Download</button>
    <br><br>
    <button class="linkedin1">Apply on company website</button>
    <button class="linkedin2">Save</button>
</body>
</html>
