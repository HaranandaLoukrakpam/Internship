<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    #container{
        border: 1px solid none;
        width:50%;
        display: flex;
        flex-wrap:wrap;
        justify-content: center;
        align-items: center;
        margin:auto;
        border-radius:5px;
        margin-top: 50px;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
        background-color: #1F3A5F;
        border-radius: 30px;
    }

    .child{
        border: 1px solid none;
        border-radius:30px;
        width: 150px;
        height: 150px;
        margin:10px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: antiquewhite;
        font-family: serif;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
    }
</style>
</head>
<body>
<body>
    <h1 style="text-align: center; font-family: serif;color: #1F3A5F;"> Flex Box</h1>
    <div id="container">
        <div class="child">Apple</div>
        <div class="child">Banana</div>
        <div class="child">Cucumber</div>
        <div class="child">Daikon</div>
        <div class="child">Fruits</div>
        <div class="child">Elephant</div>
        <div class="child">Grape</div>
        <div class="child">Hermes</div>
        <div class="child">Indigo</div>

    </div>
</body>
</html>
