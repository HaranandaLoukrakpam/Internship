<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM Style Layout</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <header>
        <div class="container">
            <div class="logo">
                <a href="#">LOGO</a>
            </div>

            <div class="search-box">
                <input type="text" placeholder="Search products...">
            </div>

            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Cart</a></li>
                    <li><a href="#">Wishlist</a></li>
                    <li><a href="#">Login / Signup</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div id="tabs">
            <button>Man's</button>
            <button>Children</button>
            <button>Women</button>
            <button>Girls</button>
            <button>New Fashion</button>

        </div>
        <div id="filter">

            <select name="price" id="price-select">
                <option value="">--Sort Products--</option>
                <option value="hToL">H to L</option>
                <option value="LToH">L to H</option>
            </select>

             <select name="cat" id="pet-select">
                <option value="">--Filter By Category--</option>
                <option value="menClothing">Men's Clothing</option>
                <option value="jewellery">Jewelery</option>
                <option value="electronics">Electronics</option>
                <option value="womenClothing">women's Clothing</option>
            </select>


        </div>
        <div id="loader">
           

        </div>
        <div id="productContainer">

        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-column">
                <h3>Company</h3>
                <a href="#">About Us</a>
                <a href="#">Careers</a>
                <a href="#">Contact</a>
            </div>

            <div class="footer-column">
                <h3>Support</h3>
                <a href="#">Help Center</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms & Conditions</a>
            </div>

            <div class="footer-column">
                <h3>Quick Links</h3>
                <a href="#">Products</a>
                <a href="#">Cart</a>
                <a href="#">Wishlist</a>
            </div>
        </div>

        <div class="footer-bottom">
            © 2026 Your Company. All Rights Reserved.
        </div>
    </footer>

</body>
<script src="index.js"></script>

</html>
